name: Python CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio flake8

      - name: Lint – critical errors (E9, F63, F7, F82)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint – full report (non-blocking)
        run: flake8 . --count --exit-zero --statistics

      - name: Syntax check
        run: python -m compileall -q .

      - name: Run tests
        run: pytest -q

      - name: Run deep diagnostic criteria
        run: pytest -q tests/test_diagnostics_deep.py
